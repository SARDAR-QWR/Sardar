<!DOCTYPE html>
<html>
<head>
  <title>JWT Auth Demo</title>
</head>
<body>

  <h2>Register</h2>
  <input type="text" id="regUsername" placeholder="Username"><br><br>
  <input type="password" id="regPassword" placeholder="Password"><br><br>
  <button onclick="register()">Register</button>

  <h2>Login</h2>
  <input type="text" id="loginUsername" placeholder="Username"><br><br>
  <input type="password" id="loginPassword" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>

  <h2>Protected Data</h2>
  <button onclick="getProtected()">Get Protected Data</button>

  <pre id="output"></pre>

<script>
let token = "";

// Register
async function register() {
  const username = document.getElementById("regUsername").value;
  const password = document.getElementById("regPassword").value;

  const res = await fetch("http://localhost:3000/register", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();
  document.getElementById("output").innerText = JSON.stringify(data, null, 2);
}

// Login
async function login() {
  const username = document.getElementById("loginUsername").value;
  const password = document.getElementById("loginPassword").value;

  const res = await fetch("http://localhost:3000/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();
  token = data.token;

  document.getElementById("output").innerText = JSON.stringify(data, null, 2);
}

// Protected route
async function getProtected() {
  const res = await fetch("http://localhost:3000/protected", {
    method: "GET",
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  const data = await res.json();
  document.getElementById("output").innerText = JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
